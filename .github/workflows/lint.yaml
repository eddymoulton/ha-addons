name: lint
on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: ./ha-config-history

  svelte:
    name: svelte-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: |
          cd ha-config-history/frontend
          npm install
      - name: Run svelte-check
        run: |
          cd ha-config-history/frontend
          npx svelte-check --tsconfig ./tsconfig.json
